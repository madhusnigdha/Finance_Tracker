<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Manager</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-tint": "#006c4e", "surface-container-lowest": "#ffffff", "on-error-container": "#93000a",
              "on-background": "#191c1e", "primary-fixed": "#97f5cc", "inverse-on-surface": "#f0f1f3",
              "secondary-fixed": "#d9e3f4", "surface-variant": "#e1e2e4", "surface-dim": "#d9dadc",
              "on-primary-container": "#9ffdd3", "secondary-fixed-dim": "#bdc7d8", "on-surface-variant": "#3e4943",
              "surface-bright": "#f8f9fb", "on-surface": "#191c1e", "on-error": "#ffffff", "outline-variant": "#bdc9c1",
              "tertiary-fixed-dim": "#cec5bf", "outline": "#6e7a73", "on-tertiary-container": "#f2e8e2",
              "on-tertiary-fixed-variant": "#4b4641", "on-secondary-fixed": "#121c28", "surface": "#f8f9fb",
              "secondary": "#555f6d", "primary": "#005d42", "secondary-container": "#d6e0f1", "error": "#ba1a1a",
              "on-primary": "#ffffff", "on-secondary-container": "#596372", "on-secondary": "#ffffff",
              "surface-container-high": "#e7e8ea", "error-container": "#ffdad6", "on-tertiary": "#ffffff",
              "on-tertiary-fixed": "#1f1b17", "tertiary-fixed": "#eae1da", "surface-container-highest": "#e1e2e4",

            },
            fontFamily: {
              "headline": ["Newsreader", "serif"],
              "body": ["Manrope", "sans-serif"],
              "label": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"}
          }
        }
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24; font-size: 20px; }
        .bg-forest-gradient { background: linear-gradient(45deg, #005d42 0%, #047857 100%); }
        .glass-effect { backdrop-filter: blur(20px); background: rgba(248, 249, 251, 0.8); }
        body { min-height: max(884px, 100dvh); }
    </style>
  </head>
  <body class="bg-surface-container-lowest font-body text-on-surface antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
